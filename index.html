<!DOCTYPE html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mohannad SEO | دستیار بهینه‌ساز محصول وردپرس</title>
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;700&display=swap');
      body {
        font-family: 'Vazirmatn', sans-serif;
      }
    </style>
</head>
  <body class="bg-gray-900 text-white">
    <div id="root"><div style="min-height:100vh;background:#111827;color:white;display:flex;align-items:center;justify-content:center;font-family:sans-serif;text-align:center;padding:24px">در حال بارگذاری Mohannad SEO...</div></div>

    <script>
      (function () {
        function showRuntimeError(message) {
          var box = document.getElementById('runtime-error-fallback');
          if (!box) {
            box = document.createElement('div');
            box.id = 'runtime-error-fallback';
            box.style.cssText = 'position:fixed;z-index:999999;left:16px;right:16px;bottom:16px;background:#7f1d1d;color:#fff;border:1px solid #f87171;border-radius:12px;padding:14px;font-family:sans-serif;direction:rtl;text-align:right;box-shadow:0 10px 30px rgba(0,0,0,.35)';
            document.body.appendChild(box);
          }
          box.textContent = 'خطای موقت صفحه: ' + (message || 'خطای نامشخص');
        }
        window.addEventListener('error', function (event) { showRuntimeError(event.message); });
        window.addEventListener('unhandledrejection', function (event) {
          var reason = event.reason && event.reason.message ? event.reason.message : String(event.reason || 'خطای ارتباط یا پردازش');
          showRuntimeError(reason);
        });
      })();
    </script>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
